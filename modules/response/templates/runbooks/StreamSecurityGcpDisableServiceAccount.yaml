main:
  params: [input]
  steps:
    # ServiceAccountId is the Stream resource id, which carries the full
    # GCP asset name: projects/<project>/serviceAccounts/<email-or-uniqueId>.
    # If the caller passed a bare email we coerce it up to the full form.
    - parseInputs:
        assign:
          - sa_input: ${input.ServiceAccountId}

    - logInput:
        call: sys.log
        args:
          text: ${"Runbook started. ServiceAccountId='" + sa_input + "'"}
          severity: INFO

    - normalize:
        switch:
          - condition: ${text.match_regex(sa_input, "^projects/[^/]+/serviceAccounts/.+")}
            assign:
              - sa_name: ${sa_input}
          - condition: ${text.match_regex(sa_input, ".+@.+")}
            assign:
              - parts: ${text.split(sa_input, "@")}
              - domain_parts: ${text.split(parts[1], ".")}
              - project_id: ${domain_parts[0]}
              - sa_name: ${"projects/" + project_id + "/serviceAccounts/" + sa_input}
          - condition: true
            raise:
              status_code: "error"
              message: ${"Invalid ServiceAccountId. Expected 'projects/<p>/serviceAccounts/<email>' or a bare SA email ending in .iam.gserviceaccount.com; got; " + sa_input}

    - disable:
        try:
          call: http.post
          args:
            url: ${"https://iam.googleapis.com/v1/" + sa_name + ":disable"}
            auth:
              type: OAuth2
            body: {}
          result: response
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to disable service account; " + default(er.body.error.message, json.encode_to_string(er))}
    - checkDisableStatus:
        switch:
          - condition: ${response.code >= 400}
            raise:
              status_code: "error"
              message: ${"Failed to disable service account; HTTP " + string(response.code)}

    - done:
        return:
          status_code: "success"
          message: ${"Service account " + sa_name + " disabled."}
